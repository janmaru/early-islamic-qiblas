<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Early Islamic Qiblas</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="styles.css" rel="stylesheet" />
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <a class="navbar-brand" href="#">Early Islamic Qiblas</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item"><a class="nav-link active" href="#" data-view="map">Map</a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="table">Mosques</a></li>
            </ul>
        </div>
    </nav>

    <div class="container-fluid main-content">
        <div id="map-view">
            <div id="map"></div>
            <div id="map-info">
                <span id="lng"></span> <span id="lat"></span> <span id="zoom"></span>
            </div>
        </div>
        <div id="table-view" style="display:none;">
            <table id="mosque-table" class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th data-sort="ageGroup">Age Group</th>
                        <th data-sort="yearCE">Year CE</th>
                        <th data-sort="country">Country</th>
                        <th data-sort="city">City</th>
                        <th data-sort="mosqueName">Name</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="pagination"></div>
        </div>
    </div>

    <footer class="text-center">
        <small>Built with historical mosque data from academic sources (ArchNet, Creswell, al-Tabari)</small>
    </footer>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="app.js"></script>
</body>
</html>
